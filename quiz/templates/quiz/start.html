<!DOCTYPE html>
<html>
<head>
    <title>World Geography Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Ogólne ustawienia strony */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Kontener formularza */
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        /* Nagłówek */
        h1 {
            margin-bottom: 25px;
            color: #333;
        }

        /* Formularz */
        form {
            display: flex;
            flex-direction: column;
        }

        input, select {
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Styl komunikatu błędu */
        .error {
            color: red;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the World Geography Quiz!</h1>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <input type="text" name="player_name" placeholder="Enter your name" required>
            <input type="text" name="player_country" placeholder="Enter your country" required>
            <input type="number" name="player_age" placeholder="Enter your age" min="1" required>

            <select name="level" required>
                <option value="">-- Choose a level --</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>

            <button type="submit">Start Quiz</button>
        </form>
    </div>
</body>
</html>
